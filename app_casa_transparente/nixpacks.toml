[phases.setup]
nixPkgs = ['flutter', 'python3']

[phases.install]
cmds = ['touch .env', 'flutter config --no-analytics']

[phases.build]
cmds = ['rm -f pubspec.lock', 'flutter pub get', 'flutter build web']

[start]
cmd = 'python3 -m http.server $PORT --directory build/web'

[variables]
CI = "true"
